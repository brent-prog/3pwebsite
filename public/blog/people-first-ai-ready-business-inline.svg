<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">People Product Profit people first business graphic</title>
  <desc id="desc">A clean 3P Solutions style people-first business graphic showing People, Product, and Profit as connected business outcomes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#e9f5f7"/></linearGradient>
    <linearGradient id="navy" x1="0" x2="1"><stop offset="0" stop-color="#081226"/><stop offset="1" stop-color="#0f2940"/></linearGradient>
    <linearGradient id="teal" x1="0" x2="1"><stop offset="0" stop-color="#00b8c8"/><stop offset="1" stop-color="#06748a"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.18"/></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="58" y="58" width="1484" height="784" rx="38" fill="#ffffff" stroke="#dce9ee" stroke-width="4" filter="url(#shadow)"/>
  <text x="115" y="135" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="900" fill="#081226">People Come First.</text>
  <text x="115" y="198" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="900" fill="#07859a">Even in an AI-Ready Business.</text>
  <line x1="115" y1="245" x2="255" y2="245" stroke="#07859a" stroke-width="9"/>
  <text x="115" y="315" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#0f172a">Business comes down to three things:</text>
  <text x="150" y="380" font-family="Arial, Helvetica, sans-serif" font-size="36" font-style="italic" fill="#0f172a">people, product, and profit.</text>
  <text x="150" y="430" font-family="Arial, Helvetica, sans-serif" font-size="36" font-style="italic" fill="#0f172a">And people come first.</text>
  <text x="150" y="486" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#07859a">- Lee Iacocca</text>
  <line x1="115" y1="530" x2="610" y2="530" stroke="#c7dce4" stroke-width="3"/>
  <text x="115" y="590" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#0f172a">A strong business starts with aligned people,</text>
  <text x="115" y="632" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#0f172a">delivers a consistent product, and creates</text>
  <text x="115" y="674" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#0f172a">healthy profit that funds opportunity.</text>
  <text x="115" y="755" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="900" fill="#07859a">Stronger business. Better-supported people.</text>

  <g transform="translate(760 110)" filter="url(#shadow)">
    <path d="M360 0 L590 240 H130 Z" fill="url(#teal)" stroke="#ffffff" stroke-width="4"/>
    <path d="M210 270 H510 L640 455 H80 Z" fill="#075174" stroke="#ffffff" stroke-width="4"/>
    <path d="M115 485 H605 L720 660 H0 Z" fill="url(#navy)" stroke="#ffffff" stroke-width="4"/>
    <g font-family="Arial, Helvetica, sans-serif" fill="#ffffff" text-anchor="middle">
      <text x="360" y="125" font-size="44" font-weight="900">PEOPLE</text>
      <text x="360" y="176" font-size="28" font-weight="700">Happy, supported,</text>
      <text x="360" y="212" font-size="28" font-weight="700">and able to succeed.</text>
      <text x="360" y="365" font-size="44" font-weight="900">PRODUCT</text>
      <text x="360" y="416" font-size="28" font-weight="700">Consistent experiences</text>
      <text x="360" y="452" font-size="28" font-weight="700">customers can trust.</text>
      <text x="360" y="585" font-size="44" font-weight="900">PROFIT</text>
      <text x="360" y="636" font-size="28" font-weight="700">Healthy results that</text>
      <text x="360" y="672" font-size="28" font-weight="700">fund growth.</text>
    </g>
  </g>
</svg>
