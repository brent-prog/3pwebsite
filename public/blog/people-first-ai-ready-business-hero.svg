    <path d="M70 520 C180 480, 285 505, 405 445" fill="none" stroke="#0f172a" stroke-width="2" opacity="0.45"/>
    <path d="M110 690 C190 610, 280 610, 405 565" fill="none" stroke="#0f172a" stroke-width="2" opacity="0.45"/>
    <g fill="#0f172a">
