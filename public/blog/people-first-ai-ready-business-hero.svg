      <circle cx="75" cy="520" r="10"/><circle cx="185" cy="480" r="8"/><circle cx="285" cy="505" r="10"/><circle cx="370" cy="450" r="8"/>
      <circle cx="110" cy="690" r="9"/><circle cx="195" cy="610" r="7"/><circle cx="295" cy="610" r="9"/><circle cx="385" cy="565" r="8"/>
    </g>
