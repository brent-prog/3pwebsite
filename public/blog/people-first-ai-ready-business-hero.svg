    <g font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="25" fill="#0f172a" text-anchor="middle">
      <text x="216" y="267" transform="rotate(-8 216 267)">TRIBAL KNOWLEDGE</text>
      <text x="213" y="444" transform="rotate(6 213 444)">OUTDATED PROCESSES</text>
      <text x="250" y="628" transform="rotate(-5 250 628)">UNCLEAR ROLES</text>
